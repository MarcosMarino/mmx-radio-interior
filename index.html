<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MMX · Radio Interior Argentina 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#09100F;--ink2:#4A5568;--ink3:#A0ADB8;
  --bg:#F2EFE7;--surf:#FFFFFF;--bdr:#E4DDD2;
  --map:#040E1B;--mapf:#0A1F38;--maps:#1A4F88;
  --blue:#0D4FA8;--green:#047857;--amber:#B45309;--red:#B01C1C;
  --gbg:#DCFCE7;--abg:#FEF9C3;--rbg:#FEE2E2;
  --noa:#0A7A68;--noa2:#D0F0EA;
  --nea:#1A7830;--nea2:#D0F0D8;
  --cuyo:#8A3018;--cuyo2:#F8E0D8;
  --centro:#876000;--centro2:#FDF0C0;
  --pat:#14508A;--pat2:#D0E4F8;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fu:'Plus Jakarta Sans',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--fu);background:var(--bg);color:var(--ink);font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
button{font-family:var(--fu);cursor:pointer;border:none;outline:none;transition:all .18s}
input,textarea{font-family:var(--fu)}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* NAV */
.top-nav{display:flex;align-items:center;background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;height:48px;flex-shrink:0;gap:0;z-index:100}
.nav-logo{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-right:24px}
.nav-logo span{color:var(--blue)}
.nav-step{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;font-size:12px;font-weight:600;color:var(--ink3);border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap}
.nav-step.active{color:var(--blue);border-color:var(--blue)}
.nav-step.done{color:var(--green);border-color:transparent}
.nav-step .step-n{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:var(--bdr);color:var(--ink3)}
.nav-step.active .step-n{background:var(--blue);color:#fff}
.nav-step.done .step-n{background:var(--green);color:#fff}
.nav-sep{width:1px;height:20px;background:var(--bdr)}
.nav-right{margin-left:auto;display:flex;gap:8px}

/* SCREEN */
.screen{flex:1;overflow:hidden;display:none}
.screen.on{display:flex}

/* ===================== PANORAMA ===================== */
.panorama{width:100%;display:flex}
.pan-left{width:52%;background:var(--map);display:flex;flex-direction:column;justify-content:center;padding:32px 40px;position:relative;overflow:hidden}
.pan-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(14,79,168,.25) 0%,transparent 60%);pointer-events:none}
.pan-eyebrow{font-size:10px;letter-spacing:.16em;color:#3A6A9A;font-weight:700;text-transform:uppercase;margin-bottom:16px}
.pan-title{font-family:var(--fd);font-size:48px;line-height:1.08;color:#ECF1F8;font-weight:400;margin-bottom:8px}
.pan-title em{font-style:italic;color:#7FB8F0}
.pan-sub{font-size:13px;color:#4A6A8A;margin-bottom:28px;line-height:1.6}
.pan-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.pan-kpi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px}
.pan-kpi-n{font-family:var(--fd);font-size:36px;font-weight:700;color:#ECF1F8;line-height:1}
.pan-kpi-n.blue{color:#60A5FA}
.pan-kpi-n.green{color:#34D399}
.pan-kpi-l{font-size:11px;color:#5A7A9A;margin-top:4px;line-height:1.4}
.pan-kpi-cmp{font-size:10px;color:#3A5A7A;margin-top:2px;font-style:italic}
.pan-kpi.featured{background:rgba(14,79,168,.15);border-color:rgba(96,165,250,.3)}
.btn-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--blue);color:#fff;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-cta:hover{background:#0A41A0}
.btn-cta svg{transition:transform .2s}
.btn-cta:hover svg{transform:translateX(3px)}
.pan-right{flex:1;background:var(--map);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.06);overflow:hidden}
.pan-map-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.pan-map-title{font-size:11px;font-weight:700;color:#4A6A8A;text-transform:uppercase;letter-spacing:.08em}
.region-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.r-chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;transition:all .18s;white-space:nowrap}
.pan-map-svg{flex:1;overflow:hidden;padding:6px 10px 6px}

/* ===================== CONSTRUCTOR ===================== */
.constructor{width:100%;display:flex;flex-direction:column;overflow:hidden}
.con-toolbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.con-toolbar-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.r-chip-con{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .18s;white-space:nowrap}
.con-body{flex:1;display:flex;overflow:hidden}
.con-map{width:38%;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;background:#fff}
.con-map-svg{flex:1;overflow:hidden;padding:6px}
.con-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bdr)}
.con-radios{flex:1;overflow-y:auto;padding-bottom:72px}
.con-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:10px;text-align:center;padding:20px}
.con-campaign{width:260px;flex-shrink:0;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

/* PLAZA header */
.pl-hd{padding:14px 16px 12px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0}
.pl-name{font-family:var(--fd);font-size:24px;font-weight:600;letter-spacing:-.01em}
.pl-meta{font-size:11px;color:var(--ink3);margin-top:3px}
.pl-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:6px}
.m4{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.mc{background:var(--bg);border-radius:7px;padding:8px 10px}
.mc-l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:700}
.mc-v{font-family:var(--fd);font-size:19px;font-weight:600;margin-top:3px;line-height:1}
.cpm-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.cpm-bar-track{flex:1;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.cpm-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.cpm-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}

/* RADIO CARD */
.r-sec-lbl{padding:8px 16px 4px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:700;background:var(--bg);border-bottom:1px solid var(--bdr)}
.rcard{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #F0EDE8;transition:all .12s}
.rcard:hover{background:#FAFAF8}
.rcard.on{background:#FAFCFF}
.rcard.off{opacity:.45}
.rchk{width:19px;height:19px;border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;border:2px solid var(--bdr)}
.rchk.on{background:var(--blue);border-color:var(--blue)}
.rbody{flex:1;min-width:0}
.rname{font-size:13px;font-weight:700;color:var(--ink)}
.rtags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.rtag{font-size:9.5px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag-am{background:#FEF9E7;color:#92610A}
.tag-fm{background:#EFF6FF;color:#1E40AF}
.tag-g{background:#F0EDE8;color:#6B6157}
.rstats{display:flex;gap:12px;margin-top:7px}
.rstat{font-size:11px;color:var(--ink2)}
.rstat strong{color:var(--ink);font-weight:600}
.rprice{text-align:right;flex-shrink:0}
.rprice-main{font-family:var(--fd);font-size:18px;font-weight:600;line-height:1}
.rprice-sub{font-size:9.5px;color:var(--ink3);margin-top:1px}

/* ACTIONS */
.pl-actions{position:sticky;bottom:0;padding:10px 14px;background:var(--surf);border-top:1px solid var(--bdr);display:flex;gap:7px}
.btn-add{flex:1;padding:10px;background:var(--blue);color:#fff;border-radius:8px;font-size:13px;font-weight:700}
.btn-add:hover{background:#0A41A0}
.btn-add:disabled{background:var(--bdr);color:var(--ink3)}
.btn-rm{padding:10px 12px;background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;border-radius:8px;font-size:12px;font-weight:600}

/* CAMPAIGN PANEL */
.camp-head{padding:12px 14px;border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0}
.camp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3)}
.camp-totals{padding:10px 12px;border-bottom:1px solid var(--bdr)}
.ct-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.ct-l{font-size:10px;color:var(--ink3)}
.ct-v{font-family:var(--fd);font-size:16px;font-weight:600}
.camp-plazas{flex:1;overflow-y:auto;padding:6px 0}
.cp-item{padding:8px 12px;border-bottom:1px solid #F0EDE8;cursor:pointer}
.cp-item:hover{background:#FAFAF8}
.cp-item.active{background:#F0F7FF}
.cp-name{font-size:12px;font-weight:700}
.cp-sub{font-size:10px;color:var(--ink3);margin-top:2px}

/* DEMOG SECTION */
.demo-sec{padding:10px 12px;border-top:1px solid var(--bdr)}
.demo-title{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);font-weight:700;margin-bottom:8px}
.demo-bar-row{margin-bottom:5px}
.demo-bar-top{display:flex;justify-content:space-between;font-size:9.5px;color:var(--ink2);margin-bottom:2px}
.demo-track{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.demo-fill{height:100%;border-radius:2px;transition:width .4s}

/* ===================== PROPUESTA ===================== */
.propuesta{width:100%;display:flex;flex-direction:column;overflow:hidden}
.prop-header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:14px 20px;flex-shrink:0}
.prop-title{font-family:var(--fd);font-size:26px;font-weight:600}
.prop-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
.pk{background:var(--bg);border-radius:8px;padding:10px 12px}
.pk-l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:700}
.pk-v{font-family:var(--fd);font-size:20px;font-weight:600;margin-top:3px}
.prop-body{flex:1;display:flex;overflow:hidden}
.prop-left{width:42%;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;background:#fff}
.prop-map{flex:1;overflow:hidden;padding:8px}
.prop-right{flex:1;overflow-y:auto;padding:16px}

/* DEMO CHARTS */
.demo-card{background:var(--surf);border-radius:10px;border:1px solid var(--bdr);padding:14px 16px;margin-bottom:12px}
.demo-card-title{font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:12px}
.demo-h-bar{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.demo-h-lbl{font-size:11px;color:var(--ink2);width:80px;flex-shrink:0}
.demo-h-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.demo-h-fill{height:100%;border-radius:4px;transition:width .5s}
.demo-h-pct{font-size:11px;font-weight:600;color:var(--ink);width:36px;text-align:right;flex-shrink:0}

/* PROP PLAZAS */
.prop-plaza-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:7px;margin-bottom:6px}
.pp-name{font-size:12px;font-weight:700}
.pp-meta{font-size:10px;color:var(--ink3);margin-top:1px}

/* OP FORM */
.op-form{background:var(--surf);border-radius:10px;border:1px solid var(--bdr);padding:14px 16px;margin-top:14px}
.op-form-title{font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:10px}
.op-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.op-field{display:flex;flex-direction:column;gap:3px}
.op-label{font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
.op-input{padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;color:var(--ink);background:var(--bg);outline:none}
.op-input:focus{border-color:var(--blue)}

/* EXPORT BUTTONS */
.export-section{display:flex;gap:10px;margin-top:14px}
.btn-exp{flex:1;padding:11px 14px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.btn-exp.agency{background:var(--ink);color:#fff}
.btn-exp.agency:hover{background:#333}
.btn-exp.pyme{background:var(--green);color:#fff}
.btn-exp.pyme:hover{background:#036648}
.btn-exp:disabled{background:var(--bdr);color:var(--ink3);cursor:default}

/* UTILS */
.cc-ok{color:#047857}.cc-mid{color:#B45309}.cc-bad{color:#B01C1C}
.cc-ok-bg{background:#DCFCE7;color:#065F46}
.cc-mid-bg{background:#FEF9C3;color:#7A4A00}
.cc-bad-bg{background:#FEE2E2;color:#7F1D1D}

.map-loading{display:flex;align-items:center;justify-content:center;height:100%;color:#4A6A8A;font-size:12px;gap:8px;flex-direction:column}
.map-loading-dot{width:6px;height:6px;border-radius:50%;background:#4A6A8A;animation:blink 1.2s ease-in-out infinite}
.map-loading-dot:nth-child(2){animation-delay:.2s}
.map-loading-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.fund-screen{width:100%;display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)}
.fund-hero{background:var(--map);padding:24px 28px 20px;flex-shrink:0}
.fund-hero-eyebrow{font-size:10px;font-weight:700;color:var(--noa);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.fund-hero-title{font-family:var(--fd);font-size:30px;color:#ECF1F8;font-weight:400;line-height:1.2;margin-bottom:8px}
.fund-hero-sub{font-size:13px;color:#4A6A8A;line-height:1.6}
.fund-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px 20px;flex:1}
.fund-card{background:var(--surf);border-radius:12px;border:1px solid var(--bdr);overflow:hidden;display:flex;flex-direction:column}
.fund-card-top{padding:16px 18px 14px;flex:1}
.fund-card-icon{font-size:28px;margin-bottom:10px;line-height:1}
.fund-card-title{font-family:var(--fd);font-size:22px;font-weight:600;color:var(--t1);margin-bottom:8px;line-height:1.2}
.fund-card-sub{font-size:12px;color:var(--t2);margin-bottom:12px;font-style:italic}
.fund-card-bullets{list-style:none;display:flex;flex-direction:column;gap:7px}
.fund-card-bullets li{font-size:12px;color:var(--t1);line-height:1.5;padding-left:14px;position:relative}
.fund-card-bullets li::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#0D4FA8}
.fund-card-foot{padding:8px 18px 10px;border-top:1px solid var(--bdr);background:var(--bg)}
.fund-card-source{font-size:9.5px;color:var(--t3);font-style:italic;line-height:1.4}
.fund-dl-banner{margin:0 20px 20px;background:var(--map);border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.fund-dl-text{font-size:12px;color:#7A9AB8;flex:1}
.fund-dl-text strong{color:#ECF1F8;display:block;margin-bottom:2px;font-size:13px}
.fund-dl-btn{padding:9px 18px;background:var(--noa);color:#fff;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;border:none;font-family:var(--fu)}
</style>
</head>

  return{inv,contacts,cpm:contacts?inv/contacts:0,reach,avisos};
}
function calcDemo(plazas,campaign){
  let totalW=0;
  let nse=[0,0,0],age=[0,0,0,0];
  Object.entries(campaign).forEach(([nm,sel])=>{
    const p=plazas.find(pl=>pl.n===nm);if(!p)return;
    p.rs.filter(r=>sel.has(r.n)).forEach(r=>{
      const w=p.p*r.rch;
      totalW+=w;
      const n=NSE_P[r.ns]||[25,45,30];
      const a=AGE_P[r.ed]||[20,40,30,10];
      nse.forEach((_,i)=>nse[i]+=n[i]*w);
      age.forEach((_,i)=>age[i]+=a[i]*w);
    });
  });
  if(!totalW)return null;
  return{nse:nse.map(v=>Math.round(v/totalW)),age:age.map(v=>Math.round(v/totalW))};
}

// Animated counter
function Counter({target,prefix='',suffix='',duration=2000}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let start=null;
    const step=ts=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setVal(Math.round(ease*target));
      if(p<1)requestAnimationFrame(step);
    };
    const id=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(id);
  },[target]);
  return React.createElement('span',null,prefix+val.toLocaleString('es-AR')+suffix);
}

// Sanitize all cell values before passing to SheetJS
// SheetJS only accepts string, number, boolean, null — anything else causes indexOf errors
function sanRow(rows){
  return rows.map(function(row){
    return row.map(function(v){
      if(v===null||v===undefined||v==='')return '';
      if(typeof v==='number'){
        if(!isFinite(v))return ''; // no Infinity or NaN
        return v;
      }
      if(typeof v==='string'||typeof v==='boolean')return v;
      return String(v); // fallback: convert to string
    });
  });
}
